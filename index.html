<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%233b82f6%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22M4 19.5A2.5 2.5 0 0 1 6.5 17H20%22></path><path d=%22M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z%22></path></svg>">
  <title>Tunginised English Dictionary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="header-area">
      <svg class="main-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
      <h1>Tunginised Dictionary</h1>
      <p class="subtitle">Enter an English word to find its Tunginised translation.</p>
    </div>
    
    <div class="search-wrapper">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="searchBar" placeholder="Type English word here..." onkeyup="search()">
    </div>
    
    <div id="results">
      <p class="loading-text">Loading live data from Google Sheets...</p>
    </div>
  </div>

  <script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0pU4ikGI8VsgHRLCLlsGLxjjwOAnPjf1egul_uMoKnQYuhRKNaLaLpb65H89YIFm-MxRC6PeMprn_/pub?gid=0&single=true&output=csv';
    let dictionary = [];

    // Fetch the live spreadsheet data
    fetch(csvUrl)
      .then(response => response.text())
      .then(data => {
        const rows = data.split('\n');
        // Loop through rows skipping the header line
        for (let i = 1; i < rows.length; i++) {
            if (rows[i].trim() !== '') {
                dictionary.push(rows[i].split(','));
            }
        }
        document.getElementById('results').innerHTML = '<p class="ready-text">Dictionary loaded! Type above to search.</p>';
      })
      .catch(error => {
        document.getElementById('results').innerHTML = '<p style="color:red; text-align:center;">Error loading dictionary.</p>';
      });

    // The real-time search function
    function search() {
      const query = document.getElementById('searchBar').value.toLowerCase().trim();
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';

      if (query === '') return; 

      // Filtering by the English word in Column C (index 2)
      const filtered = dictionary.filter(row =>
        row[2] && row[2].toLowerCase().includes(query)
      );

      if (filtered.length === 0) {
          resultsDiv.innerHTML = '<p class="no-results">No matching English words found.</p>';
      } else {
          filtered.forEach(row => {
             // row[2] is English (Col C), row[1] is Tunginised (Col B)
             if(row[2] && row[1]) {
               resultsDiv.innerHTML += `
                 <div class="card">
                   <div class="word-row">
                     <span class="badge english-badge">ENG</span>
                     <span class="english-word">${row[2].trim()}</span>
                   </div>
                   <div class="divider"></div>
                   <div class="word-row">
                     <span class="badge tung-badge">TUNG</span>
                     <span class="tunginised-word">${row[1].trim()}</span>
                   </div>
                 </div>`;
             }
          });
      }
    }
  </script>

</body>
</html>
